name: Build Unity Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag/name, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Windows-

      - name: Build Windows player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}          
        with:
          unityVersion: 6000.2.14f1
          targetPlatform: StandaloneWindows64
          buildsPath: build

      - name: Package Windows build
        run: |
          cd build
          zip -r ../Arterra-Windows-x64.zip StandaloneWindows64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arterra-Windows-x64
          path: Arterra-Windows-x64.zip

  build-macos:
    name: Build macOS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-macOS-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-macOS-

      - name: Build macOS player
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.2.14f1
          targetPlatform: StandaloneOSX
          buildsPath: build

      - name: Package macOS build
        run: |
          cd build
          zip -r -y ../Arterra-macOS.zip StandaloneOSX

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Arterra-macOS
          path: Arterra-macOS.zip

  release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          name: Arterra ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          files: |
            artifacts/Arterra-Windows-x64/Arterra-Windows-x64.zip
            artifacts/Arterra-macOS/Arterra-macOS.zip
